name: Daily Pipeline

on:
  schedule:
    - cron: "30 3 * * *"   # 3:30 AM UTC = 9:00 AM IST
  workflow_dispatch:        # manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          EOF

      - name: Download data from R2
        run: |
          rclone copy r2:cse-go-pipeline/chroma-db.tar.gz . --progress
          rclone copy r2:cse-go-pipeline/cse_go.db.tar.gz . --progress
          tar -xzf chroma-db.tar.gz
          tar -xzf cse_go.db.tar.gz
          echo "chroma-db chunks: $(python3 -c "import chromadb; c=chromadb.PersistentClient('./chroma-db'); print(c.get_collection('cse_knowledge_base').count())")"

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIPELINE_SECRET: ${{ secrets.PIPELINE_SECRET }}
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: python3 daily_pipeline.py

      - name: Upload updated data to R2
        if: success()
        run: |
          tar -czf chroma-db.tar.gz chroma-db/
          tar -czf cse_go.db.tar.gz cse_go.db
          rclone copy chroma-db.tar.gz r2:cse-go-pipeline/ --progress
          rclone copy cse_go.db.tar.gz r2:cse-go-pipeline/ --progress

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
